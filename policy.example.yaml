# Palisade Policy Configuration
# See README.md for full documentation
version: "1"

defaults:
  network_egress: deny
  filesystem: read_only
  shell_exec: deny

tools:
  weather-lookup:
    network_egress:
      allow:
        - "api.openweathermap.org"
        - "api.weatherapi.com"
    filesystem: none
    shell_exec: deny

  document-summarizer:
    network_egress: deny
    filesystem:
      read_only:
        - "./workspace/docs/"
    shell_exec: deny

  code-runner:
    network_egress: deny
    filesystem:
      read_write:
        - "./workspace/sandbox/"
    shell_exec:
      allow:
        - "python3"
        - "node"
      deny:
        - "curl"
        - "wget"
        - "nc"

detection:
  tier1:
    enabled: true
    action: block
    # Threat score thresholds (0.0 to 1.0). block_threshold must be > warn_threshold.
    block_threshold: 0.7   # Score at or above this triggers block (default: 0.7)
    warn_threshold: 0.5    # Score at or above this triggers warn (default: 0.5)
    # Maximum characters per text field before truncation (default: 10000)
    max_input_length: 10000
  tier2:
    enabled: true
    threshold: 0.75
    action: block
  canary:
    enabled: true
    rotate_interval: 3600
